<div class="page-container">
  <div class="page-header">
    <h1>{{ originName }}</h1>
  </div>
  <div class="page-content">
    <mat-card>
      <mat-card-content>
        <nav mat-tab-nav-bar>
          <a mat-tab-link
             routerLink="."
             [routerLinkActiveOptions]="{exact: true}"
             routerLinkActive="active-link">Overview</a>
          <a mat-tab-link
             routerLink="settings"
             routerLinkActive="active-link">Settings</a>
          <a mat-tab-link
             routerLink="members"
             routerLinkActive="active-link">Members</a>
          <a mat-tab-link
             routerLink="keys"
             routerLinkActive="active-link">Keys</a>
          <a mat-tab-link
             routerLink="integrations"
             routerLinkActive="active-link">Integrations</a>
        </nav>
        
        <!-- Router outlet for nested routes -->
        <div class="tab-content">
          <router-outlet></router-outlet>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
